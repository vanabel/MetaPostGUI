services:
  metapostgui:
    build:
      context: .
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.ustc.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.ustc.edu.cn/debian-security}
    image: metapostgui:latest
    container_name: metapostgui
    restart: unless-stopped
    environment:
      METAPOSTGUI_API_HOST: 127.0.0.1
      METAPOSTGUI_API_PORT: 18765
      METAPOSTGUI_WEB_HOST: 0.0.0.0
      METAPOSTGUI_WEB_PORT: 18080
      METAPOSTGUI_PORT_TRIES: 1
      # Cloudflare Tunnel / reverse proxy hostname. Override on NAS if needed.
      METAPOSTGUI_ALLOWED_HOSTS: mpost.vanabel.cn
      METAPOSTGUI_CORS_ORIGINS: https://mpost.vanabel.cn
    ports:
      - "${METAPOSTGUI_DOCKER_WEB_PORT:-18080}:18080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18080/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
